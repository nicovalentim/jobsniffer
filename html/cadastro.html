<header>
    <img src="../images/cadastroHeader.jpg">
    <h1>crie sua conta</h1>
</header>

<div class="fundo card cadastro">

    <section>
        <h1>Cadastro</h1>
        <form action="/cadastro" method="POST">

            <input type="text" name="usuario_nome" placeholder="Digite seu nome aqui" required />
            <div class="linha">
                <input type="text" name="usuario_nascimento" placeholder="Digite sua data de nascimento" required  />
                <input type="text" name="usuario_telefone"  placeholder="Digite seu telefone" required />
                <input type="text" name="usuario_CEP" placeholder="Digite seu CEP" required />
            </div>
            <input type="url" name="usuario_linkedin" placeholder="Cole o seu LinkedIn" />
            <input type="url" name="usuario_folio" placeholder="Cole o link do seu portfolio" />

            <div id="cadastro_arqReceber">
                <div class="cadastro_arqNomePadrao">enviar curriculo</div>
                <input type="file" id="cadastro_arqRecebido" />
                <div class="cadastro_arqNome"></div>
            </div>

            <button type="button" id="cadastro_arqApaga">Limpar</button>

<!--            <label><input type="checkbox">
            Aceitar termos & condições</label> -->

            <hr />
            <button type="button" class="enviar" id="cadastroBtn">Enviar</button>

            <div id="cadastroMenu">
                <input type="email" name="usuario_email"  placeholder="Digite seu e-mail" required />
                <input type="password" name="usuario_senha"  placeholder="Digite sua senha" id="senha" required />
                <input type="password" name="usuario_senha_confirm"  placeholder="Confirme sua senha" id="confirmaSenha" required />
                <p id="regrasSenha">
                    A senha deve ter:
                    <span id="r1">
                        • Pelo menos seis caracteres
                    </span><span id="r2">
                        • Uma letra maiúscula
                    </span><span id="r3">
                        • Uma letra minúscula
                    </span><span id="r4">
                        • Um número
                    </span>
                </p>
                <p id="erroConfirmaSenha">
                    As senhas devem ser iguais!
                </p>
                <button type="submit" class="enviar" href="#">Criar conta!</button>
            </div>

            <p style="text-align: center;">Ou faça Login com:</p>
            <div class="api">
                <a href><img src="../icones/github.png" /></a>
                <a href><img src="../icones/google.png" /></a>
                <a href><img src="../icones/linkedin.png" /></a>
            </div>

        </form>
    </section>

</div>
