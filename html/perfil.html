<header>
    <img src="../images/perfilHeader.jpg">
    <h1></h1>
</header>
<div class="fundo card perfil">
    <section class="dadosUsuario">
        <h1>Perfil</h1>
        <h6>(Clique nos dados para editá-los!)</h6>
        <table>
            <tr>
                <th>Nome: </th>
                <td id="perfilNome">Usuário</td>
            </tr><tr>
                <th>Email: </th>
                <td id="usuarioEmail">usuário@exemplo.com</td>
            </tr><tr>
                <th>Senha: </th>
                <td id="usuarioSenha">••••••••</td>
            </tr><tr>
                <th>Nascimento: </th>
                <td id="usuarioNascimento">00/00/0000</td>
            </tr><tr>
                <th>Telefone: </th>
                <td id="usuarioTelefone">(00) 00000-0000</td>
            </tr><tr>
                <th>CEP: </th>
                <td id="usuarioCEP">00000-000</td>
            </tr><tr>
                <th>Linkedin: </th>
                <td id="usuarioLinkedin">Perfil não associado.</td>
            </tr><tr>
                <th>Folio: </th>
                <td id="usuarioFolio">Link não enviado.</td>
            </tr>
        </table>
        <button id="perfilBtn" class="cadastro_enviar">
            Salvar Alterações
        </button>
    </section>

    <div id="posts" class="vagasPerfil"></div>

</div>
